<script>
(function(){
  const KEY='cc101-chapter-theme';
  const saved=localStorage.getItem(KEY)||'light';
  document.documentElement.setAttribute('data-theme',saved);
  function updateBtn(){
    const btn=document.getElementById('bpThemeBtn');
    if(btn) btn.textContent=(localStorage.getItem(KEY)||'light')==='dark'?'☀️':'🌙';
  }
  window.bpToggleTheme=function(){
    const cur=document.documentElement.getAttribute('data-theme')||'light';
    const next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem(KEY,next);
    updateBtn();
  };
  document.addEventListener('DOMContentLoaded',updateBtn);
})();
</script>
